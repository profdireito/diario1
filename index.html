<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Painel do Professor Digital - Caio Filipe Duarte Araújo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --verde:#1A4A2E;--verde2:#2E7D4A;--verde3:#5BAD6F;--ouro:#D4AF37;
  --bg:#F0F2F5;--card:#fff;--border:#E2E8F0;--text:#1E293B;--muted:#64748B;--light:#F8FAFC;
  --danger:#EF4444;--radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
h1,h2,h3,.syne{font-family:'Syne',sans-serif}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--verde);border-radius:4px}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0d2416 0%,#1A4A2E 60%,#0d2416 100%);padding:20px}
.lcard{background:#fff;border-radius:24px;padding:36px 28px;width:100%;max-width:360px;box-shadow:0 24px 64px #0007}
.l-btn{width:100%;background:var(--verde);color:#fff;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;transition:.15s;margin-top:6px}

/* APP LAYOUT */
#app{display:none;flex-direction:column;min-height:100vh}
#hdr{background:var(--verde);color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px #0004}
.hdr-l{display:flex;align-items:center;gap:8px}
.hdr-ico{width:32px;height:32px;background:var(--ouro);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--verde);font-weight:900}
#cwrap{display:flex;min-height:calc(100vh - 54px)}
#sb{width:214px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);overflow-y:auto}
#content{flex:1;padding:12px;overflow-y:auto;min-width:0}

/* CARDS E TABS */
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:13px;margin-bottom:10px}
.tabs{display:flex;gap:5px;overflow-x:auto;margin-bottom:10px;padding-bottom:5px}
.tab{padding:8px 14px;border-radius:9px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap}
.tab.act{background:var(--verde);color:#fff;border-color:var(--verde)}

/* BOTÕES E INPUTS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;font-weight:700;border:none;cursor:pointer;border-radius:9px;font-size:12px;padding:8px 12px;font-family:inherit}
.bp{background:var(--verde);color:#fff}.ba{background:var(--ouro);color:var(--verde)}.bs{background:#f1f5f9;color:#475569}.bd{background:var(--danger);color:#fff}
input, select, textarea{border:1.5px solid var(--border);border-radius:9px;padding:10px;background:var(--light);outline:none;width:100%;font-family:inherit;font-size:13px}
input:focus, select:focus, textarea:focus{border-color:var(--verde2);background:#fff}

/* ALUNOS E LISTAS */
.arow{display:flex;align-items:center;justify-content:space-between;padding:10px;border-radius:10px;border:1px solid #f1f5f9;margin-bottom:5px;background:#fff}
.aleft{display:flex;align-items:center;gap:10px}
.av{width:32px;height:32px;border-radius:50%;background:var(--verde);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}

/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:#0007;z-index:300;align-items:center;justify-content:center}
.mbg.show{display:flex}
.modal{background:#fff;border-radius:18px;width:90%;max-width:480px;padding:20px;max-height:85vh;overflow-y:auto}

/* AGENDA */
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:10px}
.cday{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;border:1px solid #eee;cursor:pointer}
.cday.sel{background:var(--verde);color:#fff}
</style>
</head>
<body>

<div id="login-screen">
  <div class="lcard">
    <h2 class="syne" style="color:var(--verde);text-align:center;margin-bottom:15px">Acesso Restrito</h2>
    <input type="text" id="lu" value="professor" style="margin-bottom:10px" placeholder="Usuário"/>
    <input type="password" id="lp" placeholder="Senha" style="margin-bottom:15px" onkeydown="if(event.key==='Enter')login()"/>
    <button class="l-btn" onclick="login()">Entrar no Painel</button>
    <div id="lerr" style="color:red;font-size:11px;margin-top:10px;text-align:center"></div>
  </div>
</div>

<div id="app">
  <header id="hdr">
    <div class="hdr-l">
      <div class="hdr-ico">⚖</div>
      <div>
        <div class="hdr-ttl syne">Painel do Professor Digital</div>
        <div class="hdr-s">Caio Filipe Duarte Araújo</div>
      </div>
    </div>
    <div style="display:flex;gap:15px;font-size:10px;align-items:center">
        <div class="hs"><div class="v" id="hst" style="font-weight:800;color:var(--ouro)">0</div>Turmas</div>
        <div class="hs"><div class="v" id="hsa" style="font-weight:800;color:var(--ouro)">0</div>Alunos</div>
        <div id="sync-status" style="color:#86efac;background:rgba(255,255,255,0.1);padding:4px 8px;border-radius:6px">Sincronizado</div>
    </div>
  </header>

  <div id="cwrap">
    <aside id="sb">
      <div style="padding:15px">
        <button class="tab act" id="b-turmas" onclick="setSec('turmas')" style="width:100%;margin-bottom:5px;text-align:left">🏫 Turmas</button>
        <button class="tab" id="b-agenda" onclick="setSec('agenda')" style="width:100%;margin-bottom:5px;text-align:left">📅 Agenda</button>
        <button class="tab" id="b-res" onclick="setSec('resultados')" style="width:100%;margin-bottom:5px;text-align:left">📊 Resultados Quiz</button>
        <button class="tab" onclick="exportarBackup()" style="width:100%;margin-bottom:5px;text-align:left">📥 Backup JSON</button>
        <hr style="margin:10px 0;opacity:0.1"/>
        <div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:10px">MINHAS TURMAS</div>
        <div id="trlist"></div>
      </div>
    </aside>

    <main id="content">
      <div id="sec-turmas">
        <div id="trhdr" style="display:none">
          <div class="card"><h2 id="thnom" class="syne"></h2><p id="thdisc" style="font-size:11px;color:var(--muted)"></p></div>
          <div class="tabs">
            <button class="tab act" onclick="setMod('diario',this)">📖 Diário de Aula</button>
            <button class="tab" onclick="setMod('ativ',this)">✅ Atividades/Grupo</button>
            <button class="tab" onclick="setMod('alunos',this)">👥 Lista de Alunos</button>
            <button class="tab" onclick="setMod('notas',this)">📈 Médias</button>
          </div>
          <div id="modcon"></div>
        </div>
        <div id="empty-msg" style="text-align:center;padding:50px;color:var(--muted)">
          <div style="font-size:40px;margin-bottom:10px">🏫</div>
          <p>Selecione uma turma na barra lateral para começar.</p>
        </div>
      </div>
      
      <div id="sec-agenda" style="display:none"><div class="card" id="agcon"></div></div>
      
      <div id="sec-resultados" style="display:none"><div class="card" id="rescon"></div></div>
    </main>
  </div>
</div>

<div class="mbg" id="mativ"><div class="modal">
  <h3 class="syne" style="margin-bottom:15px">Nova Atividade Individual</h3>
  <label style="font-size:10px;font-weight:700;color:var(--muted)">TÍTULO</label>
  <input type="text" id="na-n" placeholder="Ex: Resenha Crítica" style="margin-bottom:10px"/>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
    <div>
      <label style="font-size:10px;font-weight:700;color:var(--muted)">TIPO DE AVALIAÇÃO</label>
      <select id="na-t">
        <option value="visto">Somente Visto (✓)</option>
        <option value="nota">Vale Nota (0-10)</option>
      </select>
    </div>
    <div>
      <label style="font-size:10px;font-weight:700;color:var(--muted)">DATA</label>
      <input type="date" id="na-d"/>
    </div>
  </div>
  <div style="display:flex;gap:10px;margin-top:15px">
    <button class="btn bs bfw" onclick="fecharM('mativ')">Cancelar</button>
    <button class="btn bp bfw" onclick="salvarAtiv()">Criar e Lançar</button>
  </div>
</div></div>

<div class="mbg" id="mgrupo"><div class="modal">
  <h3 class="syne" style="margin-bottom:15px">Lançar Atividade em Grupo</h3>
  <label style="font-size:10px;font-weight:700;color:var(--muted)">TÍTULO</label>
  <input type="text" id="ga-n" placeholder="Ex: Seminário" style="margin-bottom:10px"/>
  
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
    <div>
      <label style="font-size:10px;font-weight:700;color:var(--muted)">TIPO DE AVALIAÇÃO</label>
      <select id="ga-t" onchange="document.getElementById('ga-nota-box').style.display=this.value==='nota'?'block':'none'">
        <option value="visto">Somente Visto (✓)</option>
        <option value="nota">Vale Nota (0-10)</option>
      </select>
    </div>
    <div>
      <label style="font-size:10px;font-weight:700;color:var(--muted)">DATA</label>
      <input type="date" id="ga-d"/>
    </div>
  </div>
  
  <div id="ga-nota-box" style="display:none;margin-bottom:10px">
    <label style="font-size:10px;font-weight:700;color:var(--muted)">NOTA DO GRUPO</label>
    <input type="number" id="ga-nota" placeholder="Ex: 8.5" step="0.1" min="0" max="10"/>
  </div>
  
  <label style="font-size:10px;font-weight:700;color:var(--muted)">LINK DO DRIVE (Opcional)</label>
  <input type="url" id="ga-link" placeholder="Link da foto ou pasta do grupo" style="margin-bottom:15px"/>
  
  <label style="font-size:10px;font-weight:700;color:var(--muted)">SELECIONE OS ALUNOS DO GRUPO</label>
  <div id="ga-alunos" style="border:1px solid #eee;padding:10px;border-radius:8px;max-height:130px;overflow-y:auto;background:var(--light);margin-bottom:15px"></div>
  
  <div style="display:flex;gap:10px">
    <button class="btn bs bfw" onclick="fecharM('mgrupo')">Cancelar</button>
    <button class="btn bp bfw" onclick="salvarGrupo()">Lançar para o Grupo</button>
  </div>
</div></div>

<div class="mbg" id="mperfil"><div class="modal" id="perfilcon"></div></div>

<script>
const FB_CONFIG = {
  apiKey:"AIzaSyB2Y6Uggohrp8hMPIa3GyPqgqyOygRA0SU",
  authDomain:"professor-digital-8f792.firebaseapp.com",
  projectId:"professor-digital-8f792",
  storageBucket:"professor-digital-8f792.firebasestorage.app",
  messagingSenderId:"4515274923",
  appId:"1:4515274923:web:25e9bc6d350a411972d7ee"
};

let DB = {turmas:[], atividades:{}, eventosAgenda:{}};
let turmaId=null, modAtual='diario', secAtual='turmas';
let atTab='lista', atAtivSel=null;
let calMes=new Date().getMonth(), calAno=new Date().getFullYear(), calDia=new Date().getDate();
let _db=null, _syncTimer=null;

function uid(){return Math.random().toString(36).slice(2,10)}
function avt(n){return(n||'?').split(' ').filter(Boolean).slice(0,2).map(p=>p[0].toUpperCase()).join('')}

// --- FIREBASE E AUTENTICAÇÃO ---
async function login(){
  if(document.getElementById('lu').value==='professor'){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    const {initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const {getFirestore}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    _db=getFirestore(initializeApp(FB_CONFIG));
    baixarDaNuvem();
  }
}

async function save(){
  if(!_db)return;
  document.getElementById('sync-status').textContent='Sincronizando...';
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(async ()=>{
    const {doc,setDoc}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    await setDoc(doc(_db,'professor','dados'), {DB:JSON.stringify(DB), updatedAt:new Date().toISOString()});
    const pub = DB.turmas.map(t=>({id:t.id, nome:t.nome, disc:t.disc, alunos:t.alunos.map(a=>({id:a.id, nome:a.nome}))}));
    await setDoc(doc(_db,'publico','turmas'), {turmas:JSON.stringify(pub)});
    document.getElementById('sync-status').textContent='Sincronizado';
  }, 1000);
}

async function baixarDaNuvem(){
  const {doc,getDoc}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  const snap=await getDoc(doc(_db,'professor','dados'));
  if(snap.exists()){ 
    DB=JSON.parse(snap.data().DB); 
    updSidebar(); 
    document.getElementById('hst').textContent = DB.turmas.length;
    document.getElementById('hsa').textContent = DB.turmas.reduce((s,t)=>s+(t.alunos?t.alunos.length:0),0);
  }
}

// --- NAVEGAÇÃO E TURMAS ---
function setSec(s){
  secAtual=s;
  document.getElementById('sec-turmas').style.display=s==='turmas'?'block':'none';
  document.getElementById('sec-agenda').style.display=s==='agenda'?'block':'none';
  document.getElementById('sec-resultados').style.display=s==='resultados'?'block':'none';
  
  document.querySelectorAll('#sb .tab').forEach(b=>b.classList.remove('act'));
  if(s==='turmas') document.getElementById('b-turmas').classList.add('act');
  if(s==='agenda'){ document.getElementById('b-agenda').classList.add('act'); renderAg(); }
  if(s==='resultados'){ document.getElementById('b-res').classList.add('act'); buscarResultados(); }
}

function updSidebar(){
  const l=document.getElementById('trlist'); l.innerHTML='';
  DB.turmas.forEach(t=>{
    const b=document.createElement('button'); b.className='tab'; b.style='width:100%;margin-bottom:4px;text-align:left;border-color:transparent;background:var(--light)';
    b.textContent=t.nome; b.onclick=()=>{turmaId=t.id; showTurma();}; l.appendChild(b);
  });
}

function showTurma(){
  const t=DB.turmas.find(x=>x.id===turmaId);
  document.getElementById('thnom').textContent=t.nome;
  document.getElementById('thdisc').textContent=t.disc;
  document.getElementById('trhdr').style.display='block';
  document.getElementById('empty-msg').style.display='none';
  setSec('turmas');
  renderMod();
}

function setMod(m, btn){
  modAtual=m; 
  document.querySelectorAll('#sec-turmas .tab').forEach(b=>b.classList.remove('act'));
  if(btn) btn.classList.add('act'); 
  renderMod();
}

function renderMod(){
  const t=DB.turmas.find(x=>x.id===turmaId);
  if(!t) return;
  const el=document.getElementById('modcon');
  
  if(modAtual==='diario'){ el.innerHTML = rDiario(t); }
  else if(modAtual==='alunos'){ el.innerHTML = rAlunos(t); }
  else if(modAtual==='ativ'){ el.innerHTML = rAtiv(t); }
  else if(modAtual==='notas'){ el.innerHTML = rNotas(t); }
}

// --- 1. DIÁRIO DE AULA ---
function rDiario(t){
  const diarios = t.diario || [];
  let h = `
    <div style="background:var(--light);padding:12px;border-radius:10px;border:1px solid var(--border);margin-bottom:15px">
      <div style="display:flex;gap:8px">
        <input type="date" id="dia-d" value="${new Date().toISOString().split('T')[0]}" style="width:140px;padding:8px"/>
        <input type="text" id="dia-c" placeholder="Conteúdo lecionado na aula..." style="flex:1;padding:8px" onkeydown="if(event.key==='Enter')salvarDiario()"/>
        <button class="btn bp" onclick="salvarDiario()">Salvar</button>
      </div>
    </div>`;
    
  if(!diarios.length){ h+='<p style="text-align:center;color:var(--muted);padding:20px">Nenhum registro de aula.</p>'; return h; }
  
  h += diarios.sort((a,b)=>b.data.localeCompare(a.data)).map(d=>`
    <div class="arow">
      <div><strong style="color:var(--verde)">${d.data.split('-').reverse().join('/')}</strong><br><span style="font-size:13px;color:var(--text)">${d.conteudo}</span></div>
      <button class="btn bd bsm" onclick="delDiario('${d.id}')">Excluir</button>
    </div>
  `).join('');
  return h;
}

function salvarDiario(){
  const data = document.getElementById('dia-d').value;
  const cont = document.getElementById('dia-c').value.trim();
  if(!data || !cont) return;
  const t = DB.turmas.find(x=>x.id===turmaId);
  if(!t.diario) t.diario = [];
  t.diario.push({id:uid(), data:data, conteudo:cont});
  save(); renderMod();
}

function delDiario(id){
  const t = DB.turmas.find(x=>x.id===turmaId);
  t.diario = t.diario.filter(d=>d.id !== id);
  save(); renderMod();
}

// --- 2. LISTA DE ALUNOS ---
function rAlunos(t){
  let h = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><h3 class="syne">Alunos Matriculados (${t.alunos.length})</h3></div>`;
  h += t.alunos.map((a,i)=>`
    <div class="arow">
      <div class="aleft"><div class="av">${avt(a.nome)}</div><div style="font-size:13px;font-weight:600">${i+1}. ${a.nome}</div></div>
      <button class="btn bs bsm" onclick="abrirPerfil('${a.id}')">Ver Perfil</button>
    </div>`).join('');
  return h;
}

// --- 3. ATIVIDADES E GRUPOS ---
function rAtiv(t){
  const ativs = DB.atividades[turmaId] || [];
  
  if(atTab==='lista'){
    let h = `
      <div style="display:flex;gap:10px;margin-bottom:15px">
        <button class="btn bp" style="flex:1" onclick="abrirModalAtiv()">+ Atividade Individual</button>
        <button class="btn ba" style="flex:1" onclick="abrirModalGrupo()">+ Lançar em Grupo</button>
      </div>`;
    if(!ativs.length) return h + '<div style="text-align:center;padding:30px;color:var(--muted)">Nenhuma atividade lançada.</div>';
    
    h += ativs.map(av=>`
      <div class="arow" style="cursor:pointer" onclick="atAtivSel='${av.id}'; atTab='lanc'; renderMod()">
        <div>
          <div style="font-weight:700;font-size:13px">${av.nome} ${av.linkDrive?`<a href="${av.linkDrive}" target="_blank" title="Ver no Drive" style="text-decoration:none">📁</a>`:''}</div>
          <div style="font-size:11px;color:var(--muted)">${av.data||'--'} • ${av.tipo==='visto'?'Somente Visto':'Vale Nota'}</div>
        </div>
        <button class="btn bd bsm" onclick="event.stopPropagation();delAtiv('${av.id}')">X</button>
      </div>`).join('');
    return h;
  }
  
  // MODO LANÇAMENTO (Lista de alunos daquela atividade)
  const av = ativs.find(x=>x.id===atAtivSel);
  if(!av){ atTab='lista'; return renderMod(); }
  
  let h = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;background:var(--light);padding:10px;border-radius:8px">
      <div><strong style="font-size:14px;color:var(--verde)">${av.nome}</strong><br><span style="font-size:11px;color:var(--muted)">Tipo: ${av.tipo==='visto'?'Visto':'Nota'}</span></div>
      <button class="btn bs bsm" onclick="atTab='lista';renderMod()">Voltar para Lista</button>
    </div>`;
    
  h += t.alunos.map(a=>{
    const reg = (a.atividades||{})[av.id] || {};
    let controleHTML = '';
    
    if(av.tipo === 'visto'){
      const isChecked = !!reg.visto;
      controleHTML = `<button class="btn ${isChecked?'bp':'bs'} bsm" style="width:80px" onclick="togVisto('${a.id}','${av.id}')">${isChecked?'✓ Visto':'Marcar'}</button>`;
    } else {
      const notaVal = reg.nota!=null ? reg.nota : '';
      controleHTML = `<input type="number" min="0" max="10" step="0.1" value="${notaVal}" style="width:70px;padding:6px;text-align:center" placeholder="--" onchange="setAtivNota('${a.id}','${av.id}',this.value)"/>`;
    }
    
    return `<div class="arow">
      <div class="aleft"><div class="av">${avt(a.nome)}</div><div style="font-size:13px">${a.nome}</div></div>
      <div>${controleHTML}</div>
    </div>`;
  }).join('');
  
  return h;
}

function abrirModalAtiv(){
  document.getElementById('na-n').value='';
  document.getElementById('na-d').value=new Date().toISOString().split('T')[0];
  document.getElementById('mativ').classList.add('show');
}

function salvarAtiv(){
  const n = document.getElementById('na-n').value.trim();
  const t = document.getElementById('na-t').value;
  const d = document.getElementById('na-d').value;
  if(!n) return;
  const id = 'at_'+Date.now();
  if(!DB.atividades[turmaId]) DB.atividades[turmaId]=[];
  DB.atividades[turmaId].push({id:id, nome:n, tipo:t, data:d});
  save(); fecharM('mativ'); 
  // Redireciona direto pra tela de dar vistos/notas
  atAtivSel = id; atTab = 'lanc'; renderMod();
}

function abrirModalGrupo(){
  const t=DB.turmas.find(x=>x.id===turmaId);
  document.getElementById('ga-n').value='';
  document.getElementById('ga-d').value=new Date().toISOString().split('T')[0];
  document.getElementById('ga-nota').value='';
  document.getElementById('ga-link').value='';
  document.getElementById('ga-alunos').innerHTML=t.alunos.map(a=>`
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;cursor:pointer">
      <input type="checkbox" class="chk-g" value="${a.id}"> ${a.nome}
    </label>`).join('');
  document.getElementById('mgrupo').classList.add('show');
}

function salvarGrupo(){
  const n = document.getElementById('ga-n').value.trim();
  const d = document.getElementById('ga-d').value;
  const tipo = document.getElementById('ga-t').value;
  const nota = parseFloat(document.getElementById('ga-nota').value);
  const link = document.getElementById('ga-link').value.trim();
  const sel = Array.from(document.querySelectorAll('.chk-g:checked')).map(c=>c.value);

  if(!n || !sel.length){alert('Preencha título e selecione alunos.'); return;}
  if(tipo==='nota' && isNaN(nota)){alert('Digite a nota do grupo.'); return;}

  const atid='at_'+Date.now(); 
  if(!DB.atividades[turmaId]) DB.atividades[turmaId]=[];
  DB.atividades[turmaId].push({id:atid, nome:n, tipo:tipo, data:d, linkDrive:link});

  const t=DB.turmas.find(x=>x.id===turmaId);
  sel.forEach(aid=>{ 
    const a=t.alunos.find(x=>x.id===aid); 
    if(!a.atividades) a.atividades={}; 
    if(tipo==='nota') a.atividades[atid]={nota:nota, linkDrive:link}; 
    else a.atividades[atid]={visto:true, linkDrive:link}; 
  });

  save(); fecharM('mgrupo'); atTab='lista'; renderMod(); alert('Registrado para os alunos do grupo!');
}

function delAtiv(id){
  if(!confirm('Excluir atividade de todos os alunos?')) return;
  DB.atividades[turmaId] = DB.atividades[turmaId].filter(x=>x.id!==id);
  const t = DB.turmas.find(x=>x.id===turmaId);
  t.alunos.forEach(a=>{ if(a.atividades) delete a.atividades[id]; });
  save(); renderMod();
}

function togVisto(aid, atid){
  const t=DB.turmas.find(x=>x.id===turmaId); const a=t.alunos.find(x=>x.id===aid);
  if(!a.atividades) a.atividades={}; if(!a.atividades[atid]) a.atividades[atid]={};
  a.atividades[atid].visto = !a.atividades[atid].visto; save(); renderMod();
}

function setAtivNota(aid, atid, val){
  const t=DB.turmas.find(x=>x.id===turmaId); const a=t.alunos.find(x=>x.id===aid);
  if(!a.atividades) a.atividades={}; if(!a.atividades[atid]) a.atividades[atid]={};
  const n = val===''?null:parseFloat(val); a.atividades[atid].nota = isNaN(n)?null:n; save();
}

// --- 4. MÉDIAS ---
function rNotas(t){
  return t.alunos.map(a=>{
    // Calcula média apenas das atividades tipo "nota"
    const ativsDaTurma = DB.atividades[turmaId]||[];
    let soma=0, qtd=0;
    ativsDaTurma.forEach(av=>{
      if(av.tipo==='nota'){
        const notaReg = a.atividades && a.atividades[av.id] ? a.atividades[av.id].nota : null;
        if(notaReg != null){ soma+=notaReg; qtd++; }
      }
    });
    const media = qtd>0 ? (soma/qtd).toFixed(1) : '--';
    const cor = media==='--' ? '#64748b' : (media>=6 ? '#16a34a' : '#dc2626');
    return `<div class="arow" onclick="abrirPerfil('${a.id}')" style="cursor:pointer">
      <div class="aleft"><div class="av">${avt(a.nome)}</div><span style="font-size:13px">${a.nome}</span></div>
      <strong style="color:${cor};font-size:15px">${media}</strong>
    </div>`;
  }).join('');
}

// --- PERFIL DO ALUNO ---
function abrirPerfil(aid){
  const t=DB.turmas.find(x=>x.id===turmaId); const a=t.alunos.find(x=>x.id===aid);
  const ativsDaTurma = DB.atividades[turmaId]||[];
  let soma=0, qtd=0;
  ativsDaTurma.forEach(av=>{ if(av.tipo==='nota'){ const n=a.atividades&&a.atividades[av.id]?a.atividades[av.id].nota:null; if(n!=null){soma+=n; qtd++;} } });
  const media = qtd>0 ? (soma/qtd).toFixed(1) : '--';
  
  let h = `<div style="display:flex;align-items:center;gap:15px;margin-bottom:20px;border-bottom:1px solid #eee;padding-bottom:15px">
    <div class="av" style="width:60px;height:60px;font-size:20px">${avt(a.nome)}</div>
    <div><h3 style="margin:0">${a.nome}</h3><p style="margin:5px 0 0 0;font-weight:700">Média: <span style="color:${media>=6?'#16a34a':'#dc2626'}">${media}</span></p></div>
  </div>
  <h4 style="font-size:11px;color:var(--muted);margin-bottom:10px">HISTÓRICO DE ATIVIDADES</h4>`;
  
  if(!ativsDaTurma.length) h+= '<p style="font-size:12px">Nenhuma atividade registrada.</p>';
  else {
    h+= ativsDaTurma.map(av=>{
      const reg = a.atividades&&a.atividades[av.id] ? a.atividades[av.id] : null;
      let val = '--';
      if(av.tipo==='visto') val = (reg&&reg.visto) ? '✓ Visto' : 'Pendente';
      else val = (reg&&reg.nota!=null) ? reg.nota : '--';
      const linkBtn = (reg&&reg.linkDrive) ? ` <a href="${reg.linkDrive}" target="_blank" style="text-decoration:none">📁</a>` : '';
      
      return `<div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee;font-size:13px">
        <span>${av.nome}${linkBtn}</span><strong>${val}</strong>
      </div>`;
    }).join('');
  }
  
  h += `<button class="btn bs" style="width:100%;margin-top:20px" onclick="fecharM('mperfil')">Fechar Perfil</button>`;
  document.getElementById('perfilcon').innerHTML = h;
  document.getElementById('mperfil').classList.add('show');
}

// --- RESULTADOS QUIZ ---
async function buscarResultados(){
  const el=document.getElementById('rescon'); el.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted)">Buscando na nuvem...</div>';
  try{
    const {collection,getDocs}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const snap=await getDocs(collection(_db,'quiz_resultados'));
    let h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px"><h3 class="syne">Resultados Recebidos do App Aluno</h3><button class="btn bp bsm" onclick="buscarResultados()">Atualizar</button></div>';
    snap.forEach(doc=>{ 
      const r=doc.data(); 
      const cor = r.placar >= 70 ? 'var(--verde2)' : 'var(--danger)';
      h+=`<div class="arow" style="align-items:flex-start">
            <div><strong>${r.nome}</strong><br><small style="color:var(--muted)">${r.turma} | ${r.disciplina}</small></div>
            <div style="text-align:right"><strong style="color:${cor};font-size:16px">${r.placar}%</strong><br><small>${r.acertos}/${r.total}</small></div>
          </div>`; 
    });
    el.innerHTML=h;
  }catch(e){ el.innerHTML='<p style="color:red">Erro de conexão ao buscar resultados.</p>'; }
}

// --- AGENDA E BACKUP ---
function renderAg(){
  const el = document.getElementById('agcon');
  const hoje = new Date().toLocaleDateString('pt-BR');
  el.innerHTML = `<h3 class="syne">📅 Agenda Pessoal</h3><p style="font-size:12px;color:var(--muted);margin-bottom:15px">Anotações sincronizadas apenas para Caio Araújo.</p>
  <div style="padding:15px;background:var(--light);border-radius:10px;border:1px solid var(--border)">
      <strong>Hoje é ${hoje}</strong>
  </div>
  <div class="cgrid" style="margin-top:15px">${Array.from({length:31},(_,i)=>`<div class="cday">${i+1}</div>`).join('')}</div>`;
}

function exportarBackup(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'}); 
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); 
  a.download=`backup_professor_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.json`; a.click();
}

function fecharM(id){document.getElementById(id).classList.remove('show');}

// INICIAR
const local=localStorage.getItem('pdb'); if(local) DB=JSON.parse(local);
</script>
