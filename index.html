<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Professor Digital - Dr. Caio Duarte</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --verde:#1A4A2E;--verde2:#2E7D4A;--verde3:#5BAD6F;--ouro:#D4AF37;
  --bg:#F0F2F5;--card:#fff;--border:#E2E8F0;--text:#1E293B;--muted:#64748B;--light:#F8FAFC;
  --danger:#EF4444;--radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
h1,h2,h3,.syne{font-family:'Syne',sans-serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--verde);border-radius:4px}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0d2416 0%,#1A4A2E 60%,#0d2416 100%);padding:20px}
.lcard{background:#fff;border-radius:24px;padding:36px 28px;width:100%;max-width:360px;box-shadow:0 24px 64px #0007}
.l-btn{width:100%;background:var(--verde);color:#fff;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;transition:.15s;margin-top:6px}

/* APP LAYOUT */
#app{display:none;flex-direction:column;min-height:100vh}
#hdr{background:var(--verde);color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px #0004}
.hdr-l{display:flex;align-items:center;gap:8px}
.hdr-ico{width:32px;height:32px;background:var(--ouro);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--verde);font-weight:900}
#cwrap{display:flex;min-height:calc(100vh - 54px)}
#sb{width:214px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);overflow-y:auto}
#content{flex:1;padding:12px;overflow-y:auto;min-width:0}

/* CARDS E TABS */
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:13px;margin-bottom:10px}
.tabs{display:flex;gap:5px;overflow-x:auto;margin-bottom:10px}
.tab{padding:8px 14px;border-radius:9px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap}
.tab.act{background:var(--verde);color:#fff;border-color:var(--verde)}

/* BOTÕES E INPUTS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;font-weight:700;border:none;cursor:pointer;border-radius:9px;font-size:12px;padding:8px 12px}
.bp{background:var(--verde);color:#fff}.ba{background:var(--ouro);color:var(--verde)}.bs{background:#f1f5f9;color:#475569}.bd{background:var(--danger);color:#fff}
input, select{border:1.5px solid var(--border);border-radius:9px;padding:10px;background:var(--light);outline:none;width:100%;font-family:inherit}

/* ALUNOS */
.arow{display:flex;align-items:center;justify-content:space-between;padding:10px;border-radius:10px;border:1px solid #f1f5f9;margin-bottom:5px;background:#fff}
.av{width:32px;height:32px;border-radius:50%;background:var(--verde);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}

/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:#0007;z-index:300;align-items:center;justify-content:center}
.mbg.show{display:flex}
.modal{background:#fff;border-radius:18px;width:90%;max-width:480px;padding:20px;max-height:85vh;overflow-y:auto}

/* AGENDA */
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:10px}
.cday{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;border:1px solid #eee;cursor:pointer}
.cday.sel{background:var(--verde);color:#fff}
</style>
</head>
<body>

<div id="login-screen">
  <div class="lcard">
    <h2 class="syne" style="color:var(--verde);text-align:center;margin-bottom:15px">Professor Digital</h2>
    <input type="text" id="lu" value="professor" style="margin-bottom:10px"/>
    <input type="password" id="lp" placeholder="Senha" style="margin-bottom:15px" onkeydown="if(event.key==='Enter')login()"/>
    <button class="l-btn" onclick="login()">Entrar no Painel</button>
    <div id="lerr" style="color:red;font-size:11px;margin-top:10px;text-align:center"></div>
  </div>
</div>

<div id="app">
  <header id="hdr">
    <div class="hdr-l"><div class="hdr-ico">⚖</div><div class="syne" style="font-weight:800">DR. CAIO DUARTE</div></div>
    <div style="display:flex;gap:15px;font-size:10px">
        <div class="hs"><div class="v" id="hst" style="font-weight:800;color:var(--ouro)">0</div>Turmas</div>
        <div class="hs"><div class="v" id="hsa" style="font-weight:800;color:var(--ouro)">0</div>Alunos</div>
        <div id="sync-status" style="color:#86efac">Sincronizado</div>
    </div>
  </header>

  <div id="cwrap">
    <aside id="sb">
      <div style="padding:15px">
        <button class="tab act" id="b-turmas" onclick="setSec('turmas')">🏫 Turmas</button>
        <button class="tab" id="b-agenda" onclick="setSec('agenda')">📅 Agenda</button>
        <button class="tab" id="b-res" onclick="setSec('resultados')">📊 Resultados Quiz</button>
        <button class="tab" onclick="exportarBackup()">📥 Backup JSON</button>
        <hr style="margin:10px 0;opacity:0.1"/>
        <div id="trlist"></div>
      </div>
    </aside>

    <main id="content">
      <div id="sec-turmas">
        <div id="trhdr" style="display:none">
          <div class="card"><h2 id="thnom" class="syne"></h2><p id="thdisc" style="font-size:11px;color:var(--muted)"></p></div>
          <div class="tabs">
            <button class="tab act" onclick="setMod('ativ',this)">✅ Atividades Individuais / Grupo</button>
            <button class="tab" onclick="setMod('notas',this)">📈 Desempenho/Médias</button>
          </div>
          <div id="modcon"></div>
        </div>
      </div>
      <div id="sec-agenda" style="display:none"><div class="card" id="agcon"></div></div>
      <div id="sec-resultados" style="display:none"><div class="card" id="rescon"></div></div>
    </main>
  </div>
</div>

<div class="mbg" id="mgrupo"><div class="modal">
  <h3 class="syne" style="margin-bottom:15px">Lançar Atividade em Grupo</h3>
  <input type="text" id="ga-n" placeholder="Nome da Atividade" style="margin-bottom:10px"/>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
    <input type="number" id="ga-nota" placeholder="Nota (0-10)" step="0.1"/>
    <input type="date" id="ga-d"/>
  </div>
  <input type="url" id="ga-link" placeholder="Link do Google Drive (Pasta ou Foto)" style="margin-bottom:10px"/>
  <p style="font-size:10px;font-weight:700;margin-bottom:5px">SELECIONE OS ALUNOS DO GRUPO:</p>
  <div id="ga-alunos" style="border:1px solid #eee;padding:10px;border-radius:8px;max-height:150px;overflow-y:auto;background:var(--light)"></div>
  <button class="btn bp bfw" style="width:100%;margin-top:15px" onclick="salvarGrupo()">Lançar para todos do grupo</button>
  <button class="btn bs bfw" style="width:100%;margin-top:5px" onclick="fecharM('mgrupo')">Cancelar</button>
</div></div>

<script>
// --- CONFIG E ESTADO ---
const FB_CONFIG = {
  apiKey:"AIzaSyB2Y6Uggohrp8hMPIa3GyPqgqyOygRA0SU",
  authDomain:"professor-digital-8f792.firebaseapp.com",
  projectId:"professor-digital-8f792",
  storageBucket:"professor-digital-8f792.firebasestorage.app",
  messagingSenderId:"4515274923",
  appId:"1:4515274923:web:25e9bc6d350a411972d7ee"
};

let DB = {turmas:[], atividades:{}, eventosAgenda:{}};
let turmaId=null, modAtual='ativ', _db=null;

// --- FIREBASE ---
async function login(){
  if(document.getElementById('lu').value==='professor'){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    const {initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const {getFirestore}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    _db=getFirestore(initializeApp(FB_CONFIG));
    baixarDaNuvem();
  }
}

async function save(){
  if(!_db)return;
  document.getElementById('sync-status').textContent='Sincronizando...';
  const {doc,setDoc}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  await setDoc(doc(_db,'professor','dados'), {DB:JSON.stringify(DB), updatedAt:new Date().toISOString()});
  
  const pub = DB.turmas.map(t=>({id:t.id, nome:t.nome, disc:t.disc, alunos:t.alunos.map(a=>({id:a.id, nome:a.nome}))}));
  await setDoc(doc(_db,'publico','turmas'), {turmas:JSON.stringify(pub)});
  document.getElementById('sync-status').textContent='Sincronizado';
}

async function baixarDaNuvem(){
  const {doc,getDoc}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  const snap=await getDoc(doc(_db,'professor','dados'));
  if(snap.exists()){ 
    DB=JSON.parse(snap.data().DB); 
    updSidebar(); 
    document.getElementById('hst').textContent = DB.turmas.length;
    document.getElementById('hsa').textContent = DB.turmas.reduce((s,t)=>s+(t.alunos?t.alunos.length:0),0);
  }
}

// --- INTERFACE ---
function updSidebar(){
  const l=document.getElementById('trlist'); l.innerHTML='';
  DB.turmas.forEach(t=>{
    const b=document.createElement('button'); b.className='tab'; b.style='width:100%;margin-bottom:3px;text-align:left;font-size:11px';
    b.textContent=t.nome; b.onclick=()=>{turmaId=t.id; showTurma();}; l.appendChild(b);
  });
}

function showTurma(){
  const t=DB.turmas.find(x=>x.id===turmaId);
  document.getElementById('thnom').textContent=t.nome;
  document.getElementById('thdisc').textContent=t.disc;
  document.getElementById('trhdr').style.display='block';
  renderMod();
}

function setMod(m, btn){
  modAtual=m; document.querySelectorAll('#sec-turmas .tab').forEach(b=>b.classList.remove('act'));
  btn.classList.add('act'); renderMod();
}

function renderMod(){
  const t=DB.turmas.find(x=>x.id===turmaId);
  const el=document.getElementById('modcon');
  if(!t) return;

  if(modAtual==='ativ'){
    el.innerHTML = `
      <div style="display:flex;gap:10px;margin-bottom:15px">
         <button class="btn ba" style="flex:1" onclick="abrirModalGrupo()">+ Lançar em Grupo</button>
      </div>
      <div id="lista-atividades">
         ${(DB.atividades[turmaId]||[]).map(av=>`
            <div class="arow">
               <div><strong>${av.nome}</strong><br><small>${av.data||''}</small></div>
               <div>${av.linkDrive ? `<a href="${av.linkDrive}" target="_blank" title="Ver no Drive" style="text-decoration:none;font-size:18px">📁</a>`:''}</div>
            </div>
         `).join('')}
      </div>`;
  } else if(modAtual==='notas'){
    el.innerHTML = t.alunos.map(a=>{
      const nts=Object.values(a.atividades||{}).map(v=>v.nota).filter(n=>n!=null);
      const m=nts.length?(nts.reduce((a,b)=>a+b,0)/nts.length).toFixed(1):'--';
      return `<div class="arow"><span>${a.nome}</span><strong>Média: ${m}</strong></div>`;
    }).join('');
  }
}

// --- LOGICA DE GRUPO ---
function abrirModalGrupo(){
  const t=DB.turmas.find(x=>x.id===turmaId);
  document.getElementById('ga-alunos').innerHTML=t.alunos.map(a=>`
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:12px;cursor:pointer">
      <input type="checkbox" class="chk-g" value="${a.id}"> ${a.nome}
    </label>`).join('');
  document.getElementById('mgrupo').classList.add('show');
}

function salvarGrupo(){
  const nome=document.getElementById('ga-n').value; 
  const nota=parseFloat(document.getElementById('ga-nota').value);
  const link=document.getElementById('ga-link').value; 
  const sel=Array.from(document.querySelectorAll('.chk-g:checked')).map(c=>c.value);

  if(!nome||isNaN(nota)||!sel.length){alert('Preencha nome, nota e selecione os alunos.'); return;}

  const atid='at_'+Date.now(); 
  if(!DB.atividades[turmaId]) DB.atividades[turmaId]=[];
  DB.atividades[turmaId].push({id:atid, nome:nome, linkDrive:link, data: document.getElementById('ga-d').value});

  const t=DB.turmas.find(x=>x.id===turmaId);
  sel.forEach(aid=>{ 
    const a=t.alunos.find(x=>x.id===aid); 
    if(!a.atividades) a.atividades={}; 
    a.atividades[atid]={nota:nota, linkDrive:link}; 
  });

  save(); fecharM('mgrupo'); renderMod(); alert('Lançado com sucesso!');
}

// --- RESULTADOS QUIZ ---
function setSec(s){
  document.getElementById('sec-turmas').style.display=s==='turmas'?'block':'none';
  document.getElementById('sec-agenda').style.display=s==='agenda'?'block':'none';
  document.getElementById('sec-resultados').style.display=s==='resultados'?'block':'none';
  document.querySelectorAll('#sb .tab').forEach(b=>b.classList.remove('act'));
  if(s==='resultados') buscarResultados();
}

async function buscarResultados(){
  const el=document.getElementById('rescon'); el.innerHTML='<p>Buscando na nuvem...</p>';
  try{
    const {collection,getDocs}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const snap=await getDocs(collection(_db,'quiz_resultados'));
    let h='<h3 class="syne" style="margin-bottom:15px">📊 Resultados do Quiz (Alunos)</h3>';
    snap.forEach(doc=>{ 
      const r=doc.data(); 
      const cor = r.placar >= 70 ? 'var(--verde2)' : 'var(--danger)';
      h+=`<div class="arow">
            <div><strong>${r.nome}</strong><br><small>${r.turma} | ${r.disciplina}</small></div>
            <div style="text-align:right"><strong style="color:${cor};font-size:16px">${r.placar}%</strong><br><small>${r.acertos}/${r.total}</small></div>
          </div>`; 
    });
    el.innerHTML=h || '<p>Nenhum resultado de quiz encontrado.</p>';
  }catch(e){ el.innerHTML='Erro ao carregar dados do quiz.'; }
}

// --- AGENDA E BACKUP ---
function renderAg(){
  const el = document.getElementById('agcon');
  el.innerHTML = `<h3 class="syne">📅 Minha Agenda Privada</h3><div class="cgrid">${Array.from({length:31},(_,i)=>`<div class="cday">${i+1}</div>`).join('')}</div>`;
}

function exportarBackup(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'}); 
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); 
  a.download=`backup_professor_${new Date().toLocaleDateString().replace(/\//g,'-')}.json`; a.click();
}

function fecharM(id){document.getElementById(id).classList.remove('show');}
function abrirM(id){document.getElementById(id).classList.add('show');}

const local=localStorage.getItem('pdb'); if(local) DB=JSON.parse(local);
</script>
</body>
</html>
