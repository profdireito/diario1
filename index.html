<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Diário de Classe - Dr. Caio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
  :root {
    --verde: #1A4A2E; --verde-hover: #143d23;
    --ouro: #D4AF37; --bg: #F4F7F6;
    --card: #FFFFFF; --text: #1E293B; --muted: #64748B;
    --border: #E2E8F0; --danger: #EF4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
  body { background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden;}
  h1, h2, h3, .syne { font-family: 'Syne', sans-serif; }

  /* TELA DE LOGIN */
  #login-screen { position: fixed; inset: 0; background: linear-gradient(135deg, #0d2416 0%, #1A4A2E 60%, #0d2416 100%); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .lcard { background: #fff; border-radius: 24px; padding: 36px 28px; width: 100%; max-width: 360px; box-shadow: 0 24px 64px rgba(0,0,0,0.4); text-align: center; }
  .l-btn { width: 100%; background: var(--verde); color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; transition: .15s; margin-top: 15px; }
  .l-btn:hover { background: var(--verde-hover); }
  input.log-inp { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid var(--border); background: var(--light); font-family: inherit; font-size: 15px; outline: none; margin-bottom: 12px; }
  input.log-inp:focus { border-color: var(--verde); background: #fff; }

  /* APP */
  #app { display: none; flex-direction: column; height: 100%; }

  /* HEADER */
  header { background: var(--verde); color: #fff; padding: 15px 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 10; flex-wrap: wrap; gap: 15px; }
  .header-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap;}
  .header-logo { background: var(--ouro); color: var(--verde); width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; }
  
  select.turma-select { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 8px 12px; border-radius: 8px; font-weight: 700; font-family: inherit; font-size: 14px; outline: none; cursor: pointer; max-width: 300px;}
  select.turma-select option { background: var(--card); color: var(--text); }
  
  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap;}
  button.btn { font-family: inherit; font-weight: 700; cursor: pointer; border: none; border-radius: 8px; padding: 10px 16px; font-size: 13px; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; }
  button.btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--ouro); color: var(--verde); }
  .btn-primary:hover { filter: brightness(1.1); }
  
  #sync-status { font-size: 12px; font-weight: 800; padding: 8px 14px; border-radius: 8px; background: var(--ouro); color: var(--verde); display: flex; align-items: center; gap: 6px; transition: 0.3s; }

  /* ÁREA DA PLANILHA */
  #spreadsheet-container { flex: 1; overflow: auto; padding: 20px; background: var(--bg); }
  .table-wrapper { background: var(--card); border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid var(--border); width: max-content; min-width: 100%; }
  table { border-collapse: collapse; width: 100%; text-align: left; }
  
  th, td { border: 1px solid var(--border); padding: 12px 14px; white-space: nowrap; }
  th { background: #f8fafc; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; z-index: 2; box-shadow: 0 1px 0 var(--border); }
  th:first-child { left: 0; z-index: 3; background: #f8fafc; box-shadow: 1px 1px 0 var(--border); min-width: 280px; }
  td:first-child { left: 0; position: sticky; background: #fff; z-index: 1; font-weight: 600; box-shadow: 1px 0 0 var(--border); color: var(--verde); }
  
  tr:hover td { background-color: #fcfdfd; }
  tr:hover td:first-child { background-color: #fcfdfd; }

  /* INPUTS DA PLANILHA */
  .cell-input { width: 100%; border: none; background: transparent; font-family: inherit; font-size: 14px; outline: none; color: var(--text); }
  .cell-input.nota { text-align: center; font-weight: 700; width: 60px; }
  .cell-input:focus { background: #e2e8f0; border-radius: 4px; padding: 4px; }
  
  /* CHECKBOX CUSTOMIZADO */
  .check-wrapper { display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .check-wrapper input { display: none; }
  .custom-box { width: 24px; height: 24px; border: 2px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: 0.15s; background: #fff; }
  .check-wrapper input:checked + .custom-box { background: var(--verde); border-color: var(--verde); }
  .check-wrapper input:checked + .custom-box::after { content: '✓'; color: #fff; font-weight: 900; font-size: 14px; }

  .delete-col { background: none; border: none; color: #ef4444; padding: 2px; font-size: 14px; margin-left: 8px; cursor: pointer; opacity: 0.5; }
  .delete-col:hover { opacity: 1; }

  /* LOADER TELA TODA */
  #full-loader { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; flex-direction: column; font-family: 'Syne', sans-serif; font-size: 20px; color: var(--verde); }
  .spinner { width: 40px; height: 40px; border: 4px solid rgba(26,74,46,0.2); border-top-color: var(--verde); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
  @keyframes spin { to { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div id="login-screen">
    <div class="lcard">
      <div style="font-size:36px;margin-bottom:5px">⚖️</div>
      <h2 class="syne" style="color:var(--verde);margin-bottom:20px">Diário de Classe</h2>
      <input type="text" id="lu" class="log-inp" value="professor" placeholder="Usuário"/>
      <input type="password" id="lp" class="log-inp" value="5864" placeholder="Senha" onkeydown="if(event.key==='Enter')login()"/>
      <button class="l-btn" onclick="login()">Acessar Sistema</button>
      <div id="lerr" style="color:var(--danger);font-size:13px;margin-top:12px;font-weight:600"></div>
    </div>
  </div>

  <div id="full-loader">
    <div class="spinner"></div>
    <span id="loader-text">Conectando à Nuvem...</span>
  </div>

  <div id="app">
    <header>
      <div class="header-left">
        <div class="header-logo">⚖</div>
        <div class="syne" style="font-size:18px">Diário Digital</div>
        <select id="seletor-turma" class="turma-select" onchange="mudarTurma()"></select>
      </div>
      <div class="controls">
        <button class="btn btn-primary" onclick="adicionarAtividade()">+ Nova Coluna (Atividade)</button>
        <div id="sync-status">☁️ Nuvem Ativa</div>
      </div>
    </header>

    <div id="spreadsheet-container">
      <div class="table-wrapper">
        <table id="planilha">
          <thead id="planilha-head"></thead>
          <tbody id="planilha-body"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
// --- 1. CONFIGURAÇÃO DO FIREBASE ---
const FB_CONFIG = {
  apiKey: "AIzaSyB2Y6Uggohrp8hMPIa3GyPqgqyOygRA0SU",
  authDomain: "professor-digital-8f792.firebaseapp.com",
  projectId: "professor-digital-8f792",
  storageBucket: "professor-digital-8f792.firebasestorage.app",
  messagingSenderId: "4515274923",
  appId: "1:4515274923:web:25e9bc6d350a411972d7ee"
};

let _db = null;
let DB = { turmas: [], atividades: {} };
let AUTH = { user: 'professor', pass: '5864' };
let turmaSelecionadaId = null;
let syncTimeout = null;

// Inicializa o Firebase
try {
  firebase.initializeApp(FB_CONFIG);
  _db = firebase.firestore();
} catch(e) {
  console.error("Erro ao inicializar Firebase", e);
}

// --- 2. LÓGICA DE ACESSO ---
function login() {
  const lu = document.getElementById('lu').value.trim();
  const lp = document.getElementById('lp').value.trim();
  
  if (lu === AUTH.user && lp === AUTH.pass) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    carregarDadosDaNuvem();
  } else {
    document.getElementById('lerr').textContent = 'Credenciais inválidas.';
  }
}

async function carregarDadosDaNuvem() {
  document.getElementById('full-loader').style.display = 'flex';
  document.getElementById('loader-text').textContent = 'Baixando turmas...';

  try {
    const docRef = await _db.collection('professor').doc('dados').get();
    if (docRef.exists) {
      DB = JSON.parse(docRef.data().DB);
    } else {
      alert("Nenhum dado encontrado na nuvem.");
    }
    
    // Atualiza a Interface
    preencherSeletorTurmas();
    if(DB.turmas && DB.turmas.length > 0) {
      turmaSelecionadaId = DB.turmas[0].id;
      document.getElementById('seletor-turma').value = turmaSelecionadaId;
      renderizarPlanilha();
    }
    document.getElementById('full-loader').style.display = 'none';

  } catch (error) {
    document.getElementById('full-loader').style.display = 'none';
    alert("Erro ao conectar com a nuvem: " + error.message);
  }
}

// --- 3. SINCRONIZAÇÃO (SALVAMENTO AUTOMÁTICO) ---
function dispararSincronizacao() {
  const badge = document.getElementById('sync-status');
  badge.textContent = 'Salvando... ⏳';
  badge.style.background = '#64748B';
  badge.style.color = '#FFFFFF';

  clearTimeout(syncTimeout);
  syncTimeout = setTimeout(async () => {
    try {
      await _db.collection('professor').doc('dados').set({
        DB: JSON.stringify(DB),
        updatedAt: new Date().toISOString()
      }, { merge: true });

      badge.textContent = 'Sincronizado ✅';
      badge.style.background = '#10b981'; // Verde sucesso
      
      setTimeout(() => {
        badge.textContent = '☁️ Nuvem Ativa';
        badge.style.background = 'var(--ouro)';
        badge.style.color = 'var(--verde)';
      }, 2500);

    } catch (e) {
      badge.textContent = 'Erro ao Salvar ❌';
      badge.style.background = 'var(--danger)';
    }
  }, 1500); // Aguarda 1.5s após o último clique para enviar à nuvem (evita spam)
}

function gerarId() {
  return "id_" + Math.random().toString(36).substr(2, 9);
}

// --- 4. RENDERIZAÇÃO DA INTERFACE ---
function preencherSeletorTurmas() {
  const sel = document.getElementById('seletor-turma');
  sel.innerHTML = '';
  DB.turmas.forEach(t => {
    sel.innerHTML += `<option value="${t.id}">${t.nome}</option>`;
  });
}

function mudarTurma() {
  turmaSelecionadaId = document.getElementById('seletor-turma').value;
  renderizarPlanilha();
}

function renderizarPlanilha() {
  if (!turmaSelecionadaId) return;

  const turma = DB.turmas.find(t => t.id === turmaSelecionadaId);
  const colunas = DB.atividades[turmaSelecionadaId] || [];

  const thead = document.getElementById('planilha-head');
  const tbody = document.getElementById('planilha-body');
  
  // Cabeçalho
  let trHead = `<tr><th>NOME DO ALUNO</th>`;
  colunas.forEach(col => {
    trHead += `<th>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <input type="text" class="cell-input" value="${col.nome}" style="font-weight:800;color:var(--muted);width:130px;text-transform:uppercase" onchange="atualizarNomeColuna('${col.id}', this.value)">
        <button class="delete-col" onclick="removerColuna('${col.id}')" title="Excluir Atividade">✕</button>
      </div>
    </th>`;
  });
  trHead += `</tr>`;
  thead.innerHTML = trHead;

  // Linhas (Alunos em ordem alfabética)
  const alunos = [...turma.alunos].sort((a,b) => a.nome.localeCompare(b.nome));
  let htmlBody = '';
  
  alunos.forEach((aluno, index) => {
    // Esconde alunos inativos
    if(aluno.ativo === false) return;

    let tr = `<tr>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="color:var(--muted);font-size:12px;font-weight:800">${index + 1}.</span>
          <input type="text" class="cell-input" style="font-weight:600;color:var(--verde)" value="${aluno.nome}" onchange="atualizarNomeAluno('${aluno.id}', this.value)">
        </div>
      </td>`;
      
    colunas.forEach(col => {
      const registro = (aluno.atividades && aluno.atividades[col.id]) ? aluno.atividades[col.id] : null;

      if (col.tipo === 'visto') {
        const isChecked = (registro && registro.visto) ? 'checked' : '';
        tr += `<td style="text-align:center">
          <label class="check-wrapper">
            <input type="checkbox" onchange="atualizarRegistro('${aluno.id}', '${col.id}', this.checked, 'visto')" ${isChecked}>
            <div class="custom-box"></div>
          </label>
        </td>`;
      } else {
        const valNota = (registro && registro.nota != null) ? registro.nota : '';
        tr += `<td style="text-align:center">
          <input type="number" class="cell-input nota" placeholder="-" step="0.1" min="0" max="10" value="${valNota}" onchange="atualizarRegistro('${aluno.id}', '${col.id}', this.value, 'nota')">
        </td>`;
      }
    });
    tr += `</tr>`;
    htmlBody += tr;
  });

  tbody.innerHTML = htmlBody;
}

// --- 5. AÇÕES DE EDIÇÃO ---
function atualizarNomeAluno(alunoId, novoNome) {
  const turma = DB.turmas.find(t => t.id === turmaSelecionadaId);
  const aluno = turma.alunos.find(a => a.id === alunoId);
  
  if (aluno) {
    if (novoNome.trim() === '') {
      if(confirm('O nome está vazio. Deseja excluir este aluno da lista?')) {
        turma.alunos = turma.alunos.filter(a => a.id !== alunoId);
      }
    } else {
      aluno.nome = novoNome;
    }
    renderizarPlanilha();
    dispararSincronizacao();
  }
}

function adicionarAtividade() {
  const nome = prompt("Nome da Atividade (ex: Fichamento):");
  if (!nome) return;
  const tipoInput = confirm("Clique em OK se for SOMENTE VISTO (✓)\nClique em CANCELAR se for VALER NOTA (0-10)");
  
  if (!DB.atividades[turmaSelecionadaId]) {
      DB.atividades[turmaSelecionadaId] = [];
  }

  DB.atividades[turmaSelecionadaId].push({
    id: "col_" + gerarId(),
    nome: nome,
    tipo: tipoInput ? "visto" : "nota"
  });
  
  renderizarPlanilha();
  dispararSincronizacao();
}

function atualizarNomeColuna(colId, novoNome) {
  const colunas = DB.atividades[turmaSelecionadaId];
  const col = colunas.find(c => c.id === colId);
  if (col) {
    col.nome = novoNome;
    dispararSincronizacao();
  }
}

function removerColuna(colId) {
  if (confirm('Tem certeza que deseja excluir esta atividade e as notas/vistos de TODOS os alunos?')) {
    DB.atividades[turmaSelecionadaId] = DB.atividades[turmaSelecionadaId].filter(c => c.id !== colId);
    
    const turma = DB.turmas.find(t => t.id === turmaSelecionadaId);
    turma.alunos.forEach(aluno => {
      if(aluno.atividades && aluno.atividades[colId]) {
        delete aluno.atividades[colId];
      }
    });
    
    renderizarPlanilha();
    dispararSincronizacao();
  }
}

function atualizarRegistro(alunoId, colId, valor, tipo) {
  const turma = DB.turmas.find(t => t.id === turmaSelecionadaId);
  const aluno = turma.alunos.find(a => a.id === alunoId);
  
  if (!aluno.atividades) aluno.atividades = {};
  if (!aluno.atividades[colId]) aluno.atividades[colId] = {};
  
  if (tipo === 'nota') {
    aluno.atividades[colId].nota = valor === '' ? null : parseFloat(valor);
  } else {
    aluno.atividades[colId].visto = valor;
  }
  
  dispararSincronizacao();
}
</script>
</body>
</html>
