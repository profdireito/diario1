<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<style>
  :root {
    --verde: #1A4A2E; --verde-hover: #143d23; --ouro: #D4AF37;
    --bg: #F4F7F6; --card: #FFFFFF; --text: #1E293B; --muted: #64748B;
    --border: #E2E8F0; --danger: #EF4444;
    --ui-font-size: 14px; --ui-col-width: 90px; --ui-padding: 8px 10px;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
  body { background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-size: var(--ui-font-size); transition: font-size 0.2s;}
  h1, h2, h3, .syne { font-family: 'Syne', sans-serif; }

  /* HEADER */
  header { background: var(--verde); color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 10; flex-wrap: wrap; gap: 10px; }
  .header-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap;}
  .header-logo { background: var(--ouro); color: var(--verde); width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; flex-shrink: 0; }
  select.turma-select { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 8px 12px; border-radius: 8px; font-weight: 700; font-family: inherit; font-size: 14px; outline: none; cursor: pointer; max-width: 250px;}
  select.turma-select option { background: var(--card); color: var(--text); }
  
  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center;}
  button { font-family: inherit; font-weight: 700; cursor: pointer; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
  button:active { transform: scale(0.97); }
  .btn-primary { background: var(--ouro); color: var(--verde); }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
  .btn-secondary:hover { background: rgba(255,255,255,0.2); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-icon { padding: 8px; font-size: 16px; background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.3); }
  .btn-icon:hover { background: rgba(255,255,255,0.1); }

  /* SEARCH BAR */
  .search-box { position: relative; display: flex; align-items: center; background: rgba(255,255,255,0.1); border-radius: 8px; padding: 0 10px; border: 1px solid rgba(255,255,255,0.2);}
  .search-box input { background: transparent; border: none; color: #fff; padding: 8px 5px; outline: none; font-family: inherit; font-weight: 500; font-size: 13px; width: 160px; }
  .search-box input::placeholder { color: rgba(255,255,255,0.6); }

  /* ÁREA DA PLANILHA */
  #spreadsheet-container { flex: 1; overflow: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
  .table-wrapper { background: var(--card); border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid var(--border); width: max-content; min-width: 100%; }
  table { border-collapse: collapse; width: 100%; text-align: left; }
  
  th, td { border: 1px solid var(--border); padding: var(--ui-padding); white-space: nowrap; transition: padding 0.2s; }
  th { background: #f8fafc; font-size: 0.8em; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; z-index: 2; box-shadow: 0 1px 0 var(--border); min-width: var(--ui-col-width); transition: min-width 0.2s;}
  th:first-child { left: 0; z-index: 3; background: #f8fafc; box-shadow: 1px 1px 0 var(--border); min-width: 260px; max-width: 260px;}
  td:first-child { left: 0; position: sticky; background: #fff; z-index: 1; box-shadow: 1px 0 0 var(--border); display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  
  tr:hover td { background-color: #fcfdfd; }
  tr:hover td:first-child { background-color: #fcfdfd; }
  tr.inativo td { opacity: 0.4; background-color: #f8fafc; }
  tr.inativo td:first-child { background-color: #f8fafc; }

  /* NOME E INPUTS */
  .cell-input { width: 100%; border: none; background: transparent; font-family: inherit; font-size: inherit; outline: none; color: var(--text); }
  .cell-input.nome { font-weight: 700; color: var(--verde); cursor: text; }
  .cell-input.nota { text-align: center; font-weight: 700; width: 100%; }
  .cell-input:focus { background: #e2e8f0; border-radius: 4px; padding: 2px 4px; box-shadow: inset 0 0 0 1px var(--ouro); }
  
  .btn-ficha { background: var(--bg); border: 1px solid var(--border); color: var(--muted); font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
  .btn-ficha:hover { background: var(--ouro); color: #fff; border-color: var(--ouro); }

  /* CHECKBOX CUSTOMIZADO ACESSÍVEL (PODE USAR SETAS E ESPAÇO) */
  .check-wrapper { display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
  .check-wrapper input { position: absolute; opacity: 0; width: 0; height: 0; }
  .custom-box { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: 0.1s; background: #fff; }
  .check-wrapper input:checked + .custom-box { background: var(--verde); border-color: var(--verde); }
  .check-wrapper input:checked + .custom-box::after { content: '✓'; color: #fff; font-weight: 900; font-size: 14px; }
  .check-wrapper input:focus + .custom-box { outline: 2px solid var(--ouro); outline-offset: 2px; }

  .delete-col { background: none; border: none; color: #ef4444; padding: 2px; font-size: 14px; margin-left: 8px; cursor: pointer; opacity: 0.5; }
  .delete-col:hover { opacity: 1; }

  /* MODAIS E TOAST */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; padding: 15px; backdrop-filter: blur(2px); }
  .modal-overlay.show { display: flex; animation: fadeIn 0.2s ease; }
  .modal-box { background: #fff; border-radius: 16px; width: 100%; max-width: 500px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); position: relative; max-height: 90vh; overflow-y: auto;}
  .modal-close { position: absolute; top: 16px; right: 16px; background: #f1f5f9; border: none; width: 30px; height: 30px; border-radius: 50%; font-weight: bold; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  
  .log-item { padding: 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .log-time { font-size: 11px; color: var(--muted); font-weight: 700; margin-bottom: 3px; }
  .log-desc { color: var(--text); line-height: 1.4; }

  #toast { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 12px 24px; border-radius: 8px; font-weight: 700; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 3000; box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
  #toast.show { opacity: 1; transform: translateY(-10px); }

  /* MOBILE */
  @media (max-width: 768px) {
    header { flex-direction: column; align-items: stretch; padding: 12px; gap: 10px; }
    .header-left { justify-content: space-between; width: 100%; }
    .header-left .syne { display: none; }
    .turma-select { flex: 1; margin-left: 10px; font-size: 13px; max-width: 100%; }
    .controls { overflow-x: auto; padding-bottom: 5px; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
    .controls button { flex-shrink: 0; padding: 8px 12px; font-size: 12px; }
    .search-box { width: 100%; }
    .search-box input { width: 100%; }
    #spreadsheet-container { padding: 0; }
    .table-wrapper { border-radius: 0; border-left: none; border-right: none; }
    th:first-child { min-width: 200px !important; max-width: 200px !important; }
    .btn-ficha { padding: 4px 6px; font-size: 9px; }
  }
</style>

        <button class="btn-primary" onclick="adicionarAtividade()">+ Atividade</button>
        <button class="btn-icon" onclick="abrirModal('modal-config')">⚙️</button>
      </div>
    </header>

    <div id="spreadsheet-container">

        <table id="planilha">
          <thead id="planilha-head"></thead>
          <tbody id="planilha-body"></tbody>
        </table>
      </div>
    </div>
  </div>

        <button class="btn-danger" style="flex:1; min-width:120px;" id="btn-del-aluno">Excluir Aluno</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-diario">
    <div class="modal-box" style="max-width: 600px;">
      <button class="modal-close" onclick="fecharModal('modal-diario')">✕</button>
      <h2 class="syne" style="color:var(--verde); margin-bottom:20px;">📖 Diário de Aula</h2>
      <div style="background:var(--bg); padding:15px; border-radius:10px; border:1px solid var(--border); margin-bottom:20px;">
        <div style="display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap;">
          <input type="date" id="diario-data" style="border:1px solid var(--border); border-radius:8px; padding:10px; font-family:inherit; outline:none;">

        </div>
        <button class="btn-primary" style="width:100%; justify-content:center;" onclick="salvarDiario()">Guardar Registo</button>
      </div>
      <div id="lista-diario" style="max-height:300px; overflow-y:auto; padding-right:5px;"></div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-logs">
    <div class="modal-box" style="max-width: 500px;">

      <h2 class="syne" style="color:var(--ouro); margin-bottom:5px;">⏱️ Histórico de Ações</h2>

      <div id="lista-logs" style="max-height:350px; overflow-y:auto; border:1px solid var(--border); border-radius:8px; background:var(--bg);">
        </div>
      <button class="btn-secondary" style="width:100%; justify-content:center; margin-top:15px; color:var(--danger); border:1px solid var(--danger); background:#fff;" onclick="limparLogs()">Limpar Histórico</button>
    </div>
  </div>

  <div class="modal-overlay" id="modal-config">

    </div>
  </div>

// --- ESTADO DA APLICAÇÃO ---
let db = null;
let turmaSelecionadaId = null;
let alunoAtivoPerfil = null; 

let UI_PREFS = { fontSize: 13, colWidth: 90, padding: "8px 10px" };

window.onload = () => {
  const salvo = localStorage.getItem('drcaio_diariopro_v6');
  if (salvo) db = JSON.parse(salvo);
  else { db = JSON_MIGRACAO; salvar(); }
  
  if (!db.logs) db.logs = [];

  const uiSalvo = localStorage.getItem('drcaio_uiprefs_v6');
  if (uiSalvo) {
    UI_PREFS = JSON.parse(uiSalvo);
    document.getElementById('ui-fs').value = UI_PREFS.fontSize;
    document.getElementById('ui-cw').value = UI_PREFS.colWidth;
    aplicarEstilosGlobais();
  }
  
  preencherSeletorTurmas();
  if(db.turmas.length > 0) {
    turmaSelecionadaId = db.turmas[0].id;
    document.getElementById('seletor-turma').value = turmaSelecionadaId;
    renderizarPlanilha();
  }
};

function salvar() {
  localStorage.setItem('drcaio_diariopro_v6', JSON.stringify(db));
  mostrarToast();
}

function mostrarToast() {
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1500);
}

function gerarId() { return "id_" + Math.random().toString(36).substr(2, 9); }

function formataDataHora(isoString) {
  if (!isoString) return 'Data não registada';
  const d = new Date(isoString);
  return d.toLocaleDateString('pt-BR') + ' às ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
}

// --- LOG DE AUDITORIA ---
function registrarLog(acao, detalhe) {
  db.logs.unshift({
    id: gerarId(),
    data: new Date().toISOString(),
    acao: acao,
    detalhe: detalhe
  });
  if (db.logs.length > 200) db.logs.pop(); // Mantém apenas os últimos 200 eventos
  salvar();
}

function abrirLogs() {
  const lista = document.getElementById('lista-logs');
  if (db.logs.length === 0) {
    lista.innerHTML = '<div style="padding:20px; text-align:center; color:var(--muted); font-size:12px;">Nenhum registo no histórico.</div>';
  } else {
    lista.innerHTML = db.logs.map(log => `
      <div class="log-item">
        <div class="log-time">${formataDataHora(log.data)}</div>
        <div class="log-desc"><strong>${log.acao}:</strong> ${log.detalhe}</div>
      </div>
    `).join('');
  }
  abrirModal('modal-logs');
}

function limparLogs() {
  if(confirm("Tem a certeza que deseja apagar o histórico de alterações?")) {
    db.logs = []; salvar(); abrirLogs();
  }
}

// --- RENDERIZAÇÃO E FILTRO ---
function preencherSeletorTurmas() {
  const sel = document.getElementById('seletor-turma');
  sel.innerHTML = '';
  db.turmas.forEach(t => { sel.innerHTML += `<option value="${t.id}">${t.nome}</option>`; });
}

function mudarTurma() {
  turmaSelecionadaId = document.getElementById('seletor-turma').value;
  document.getElementById('busca-aluno').value = '';
  renderizarPlanilha();
}

function filtrarTabela() {
  const termo = document.getElementById('busca-aluno').value.toLowerCase();
  const linhas = document.querySelectorAll('#planilha-body tr');
  linhas.forEach(linha => {
    const nome = linha.getAttribute('data-nome').toLowerCase();
    linha.style.display = nome.includes(termo) ? '' : 'none';
  });
}

function renderizarPlanilha() {
  if (!turmaSelecionadaId) return;

  const turma = db.turmas.find(t => t.id === turmaSelecionadaId);
  const colunas = db.atividades[turmaSelecionadaId] || [];

  const thead = document.getElementById('planilha-head');
  const tbody = document.getElementById('planilha-body');
  
  // Cabeçalho
  let trHead = `<tr><th>NOME DO ALUNO</th>`;
  colunas.forEach(col => {
    trHead += `<th>
      <div style="display:flex; justify-content:space-between; align-items:center; gap:2px">
        <input type="text" class="cell-input" value="${col.nome}" style="font-weight:800;color:var(--muted);text-transform:uppercase" onchange="atualizarNomeColuna('${col.id}', this.value, '${col.nome}')">
        <button class="delete-col" onclick="removerColuna('${col.id}', '${col.nome}')" title="Excluir Coluna">✕</button>
      </div>
    </th>`;
  });
  trHead += `</tr>`;
  thead.innerHTML = trHead;

  // Linhas (Alunos)
  const alunos = [...turma.alunos].sort((a,b) => a.nome.localeCompare(b.nome));
  let htmlBody = '';
  
  alunos.forEach((aluno, rIndex) => {
    const inativoClass = aluno.ativo === false ? 'inativo' : '';
    
    let tr = `<tr class="${inativoClass}" data-nome="${aluno.nome}">
      <td>
        <div style="display:flex; align-items:center; gap:8px;">
          <input type="text" class="cell-input nome" data-r="${rIndex}" data-c="0" value="${aluno.nome}" onchange="atualizarNomeAluno('${aluno.id}', this.value, '${aluno.nome}')" onkeydown="navGrid(event, ${rIndex}, 0)">
          <button class="btn-ficha" onclick="abrirPerfilAluno('${aluno.id}')">FICHA</button>
        </div>
      </td>`;
      
    colunas.forEach((col, cIndex) => {
      const registro = (aluno.atividades && aluno.atividades[col.id]) ? aluno.atividades[col.id] : null;
      const disabled = aluno.ativo === false ? 'disabled' : '';
      const c = cIndex + 1; // coluna 0 é o nome

      if (col.tipo === 'visto') {
        const isChecked = (typeof registro === 'object' ? registro.visto : registro === true) ? 'checked' : '';
        tr += `<td style="text-align:center">
          <label class="check-wrapper">
            <input type="checkbox" data-r="${rIndex}" data-c="${c}" onchange="atualizarRegistro('${aluno.id}', '${col.id}', this.checked, 'visto')" onkeydown="navGrid(event, ${rIndex}, ${c})" ${isChecked} ${disabled}>
            <div class="custom-box"></div>
          </label>
        </td>`;
      } else {
        const valNota = (typeof registro === 'object' && registro.nota != null) ? registro.nota : (typeof registro === 'number' ? registro : '');
        tr += `<td style="text-align:center">
          <input type="number" class="cell-input nota" data-r="${rIndex}" data-c="${c}" placeholder="-" step="0.1" min="0" max="10" value="${valNota}" onchange="atualizarRegistro('${aluno.id}', '${col.id}', this.value, 'nota')" onkeydown="navGrid(event, ${rIndex}, ${c})" ${disabled}>
        </td>`;
      }
    });
    tr += `</tr>`;
    htmlBody += tr;
  });

  tbody.innerHTML = htmlBody;
}

// --- NAVEGAÇÃO COM SETAS (ESTILO PLANILHA) ---
function navGrid(event, r, c) {
  const keys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
  if (!keys.includes(event.key)) return;

  let nextR = r, nextC = c;
  if (event.key === 'ArrowUp') nextR--;
  if (event.key === 'ArrowDown') nextR++;
  if (event.key === 'ArrowLeft') nextC--;
  if (event.key === 'ArrowRight') nextC++;

  const nextEl = document.querySelector(`[data-r="${nextR}"][data-c="${nextC}"]`);
  if (nextEl) {
    event.preventDefault();
    nextEl.focus();
    if(nextEl.type === 'text' || nextEl.type === 'number') nextEl.select();
  }
}

// --- GESTÃO DE COLUNAS E REGISTROS ---
function adicionarAluno() {
  const turma = db.turmas.find(t => t.id === turmaSelecionadaId);
  const nome = prompt("Digite o nome do aluno:");
  if(nome && nome.trim() !== '') {
      turma.alunos.push({ id: gerarId(), nome: nome.trim(), atividades: {}, ativo: true });
      registrarLog("Aluno Adicionado", `${nome.trim()} adicionado à turma ${turma.nome}.`);
      renderizarPlanilha();
  }
}

function atualizarNomeAluno(alunoId, novoNome, nomeAntigo) {
  const turma = db.turmas.find(t => t.id === turmaSelecionadaId);
  const aluno = turma.alunos.find(a => a.id === alunoId);
  if (aluno && novoNome.trim() !== '') {
      aluno.nome = novoNome.trim();
      registrarLog("Nome de Aluno Alterado", `De '${nomeAntigo}' para '${novoNome.trim()}'.`);
      salvar();
  }
}

function adicionarAtividade() {
  const nome = prompt("Nome da Atividade (ex: Fichamento):");
  if (!nome) return;
  const tipoInput = confirm("Clique em OK se for VISTO (✓)\nClique em CANCELAR se for NOTA (0-10)");
  if (!db.atividades[turmaSelecionadaId]) { db.atividades[turmaSelecionadaId] = []; }
  
  db.atividades[turmaSelecionadaId].push({ id: "col_" + gerarId(), nome: nome, tipo: tipoInput ? "visto" : "nota" });
  registrarLog("Atividade Criada", `Coluna '${nome}' adicionada na turma.`);
  renderizarPlanilha();
}

function atualizarNomeColuna(colId, novoNome, nomeAntigo) {
  const colunas = db.atividades[turmaSelecionadaId];
  const col = colunas.find(c => c.id === colId);
  if (col && novoNome.trim() !== '') { 
    col.nome = novoNome.trim(); 
    registrarLog("Atividade Renomeada", `De '${nomeAntigo}' para '${novoNome.trim()}'.`);
    salvar(); 
  }
}

function removerColuna(colId, nomeCol) {
  if (confirm(`Deseja excluir a atividade '${nomeCol}' e todas as notas/vistos dos alunos nela?`)) {
    db.atividades[turmaSelecionadaId] = db.atividades[turmaSelecionadaId].filter(c => c.id !== colId);
    db.turmas.find(t => t.id === turmaSelecionadaId).alunos.forEach(aluno => { 
      if(aluno.atividades && aluno.atividades[colId]) delete aluno.atividades[colId]; 
    });
    registrarLog("Atividade Excluída", `A coluna '${nomeCol}' foi removida.`);
    renderizarPlanilha();
  }
}

function atualizarRegistro(alunoId, colId, valor, tipo) {
  const turma = db.turmas.find(t => t.id === turmaSelecionadaId);
  const aluno = turma.alunos.find(a => a.id === alunoId);
  const colName = db.atividades[turmaSelecionadaId].find(c => c.id === colId).nome;
  
  if (!aluno.atividades) aluno.atividades = {};
  
  const timestamp = new Date().toISOString();

  if (tipo === 'nota') {
    const valNota = valor === '' ? null : parseFloat(valor);
    aluno.atividades[colId] = { nota: valNota, data: timestamp };
    registrarLog("Nota Atualizada", `${valNota != null ? valNota : 'Apagada'} para ${aluno.nome} em '${colName}'.`);
  } else {
    aluno.atividades[colId] = { visto: valor, data: timestamp };
    registrarLog("Visto Atualizado", `${valor ? 'Dado' : 'Removido'} para ${aluno.nome} em '${colName}'.`);
  }
  salvar();
}

// --- PERFIL DO ALUNO ---
function abrirPerfilAluno(alunoId) {
    alunoAtivoPerfil = alunoId;
    const turma = db.turmas.find(t => t.id === turmaSelecionadaId);
    const aluno = turma.alunos.find(a => a.id === alunoId);
    const colunas = db.atividades[turmaSelecionadaId] || [];

    document.getElementById('perf-avatar').textContent = aluno.nome.charAt(0).toUpperCase();
    document.getElementById('perf-nome').textContent = aluno.nome;
    document.getElementById('perf-mat').textContent = `Matrícula: ${aluno.mat || 'Não informada'}`;

    const isAtivo = aluno.ativo !== false;
    document.getElementById('perf-badge-area').innerHTML = isAtivo 
        ? '<span style="background:#10b981; color:#fff; font-size:11px; padding:4px 10px; border-radius:12px; font-weight:bold;">Ativo na Turma</span>' 
        : '<span style="background:var(--danger); color:#fff; font-size:11px; padding:4px 10px; border-radius:12px; font-weight:bold;">Matrícula Trancada / Inativo</span>';

    let htmlAtivs = ''; let somaNotas = 0, qtdNotas = 0;
    if (colunas.length === 0) { 
        htmlAtivs = '<div style="color:var(--muted); font-size:12px; text-align:center">Nenhuma atividade registada.</div>'; 
    } else {
        colunas.forEach(col => {
            const reg = (aluno.atividades && aluno.atividades[col.id]) ? aluno.atividades[col.id] : null;
            let status = '--'; let timeStr = '';
            
            // Compatibilidade com dados antigos (onde reg era apenas 'true' ou numero)
            const isRegObj = typeof reg === 'object' && reg !== null;
            const dataReg = (isRegObj && reg.data) ? formataDataHora(reg.data) : 'Data antiga/não registada';

            if (col.tipo === 'visto') { 
                const temVisto = isRegObj ? reg.visto : reg === true;
                if(temVisto) {
                    status = '<span style="color:#10b981; font-weight:bold">✓ Visto</span>';
                    timeStr = `<div style="font-size:10px; color:var(--muted); margin-top:2px;">${dataReg}</div>`;
                } else {
                    status = '<span style="color:var(--danger)">Pendente</span>';
                }
            } else { 
                const notaVal = isRegObj ? reg.nota : (typeof reg === 'number' ? reg : null);
                if (notaVal != null) { 
                    status = `<span style="font-weight:bold">${notaVal}</span>/10`; 
                    somaNotas += notaVal; qtdNotas++; 
                    timeStr = `<div style="font-size:10px; color:var(--muted); margin-top:2px;">Inserida: ${dataReg}</div>`;
                } else { 
                    status = '<span style="color:var(--danger)">Sem nota</span>'; 
                } 
            }
            
            htmlAtivs += `<div style="padding:10px 0; border-bottom:1px solid var(--border); font-size:13px; display:flex; justify-content:space-between; align-items:center;">
                <div>
                  <span style="color:var(--text); font-weight:700">${col.nome}</span>
                  ${timeStr}
                </div>
                <div>${status}</div>
            </div>`;
        });
        
        if (qtdNotas > 0) {
            const media = (somaNotas / qtdNotas).toFixed(1);
            htmlAtivs += `<div style="display:flex; justify-content:space-between; padding:12px 0 0 0; font-size:15px; margin-top:8px;"><span style="font-weight:800;">MÉDIA (Notas):</span><span style="font-weight:900; color:${media >= 6 ? '#10b981' : 'var(--danger)'}">${media}</span></div>`;
        }
    }
    document.getElementById('perf-atividades').innerHTML = htmlAtivs;

    const btnToggle = document.getElementById('btn-tog-status');
    btnToggle.textContent = isAtivo ? 'Desativar Aluno' : 'Reativar Aluno';
    btnToggle.onclick = () => alternarStatusAluno(alunoId, !isAtivo);

    const btnDel = document.getElementById('btn-del-aluno');
    btnDel.onclick = () => confirmarExclusaoAluno(alunoId, aluno.nome);

    abrirModal('modal-perfil');
}

function alternarStatusAluno(alunoId, novoStatus) {
    const turma = db.turmas.find(t => t.id === turmaSelecionadaId);
    const aluno = turma.alunos.find(a => a.id === alunoId);
    aluno.ativo = novoStatus; 
    registrarLog("Status do Aluno", `${aluno.nome} foi ${novoStatus ? 'Reativado' : 'Desativado'}.`);
    salvar(); fecharModal('modal-perfil'); renderizarPlanilha();
}

function confirmarExclusaoAluno(alunoId, nomeAluno) {
    if(confirm("ATENÇÃO: A exclusão apaga todas as notas deste aluno.\nDeseja prosseguir?")) {
        const turma = db.turmas.find(t => t.id === turmaSelecionadaId);
        turma.alunos = turma.alunos.filter(a => a.id !== alunoId);
        registrarLog("Aluno Excluído", `${nomeAluno} foi apagado do sistema.`);
        salvar(); fecharModal('modal-perfil'); renderizarPlanilha();
    }
}
