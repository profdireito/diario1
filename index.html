<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>LMS Dr. Caio - Gestão Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    /* Cores Premium */
    --verde: #1A4A2E; --verde-hover: #143d23;
    --ouro: #D4AF37; --bg: #F4F7F6;
    --card: #FFFFFF; --text: #1E293B; --muted: #64748B;
    --border: #E2E8F0; --danger: #EF4444;
    
    /* Variáveis Dinâmicas de UI (Controladas pelo Utilizador) */
    --ui-font-size: 14px;
    --ui-col-width: 140px;
    --ui-padding: 10px 14px;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
  body { background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-size: var(--ui-font-size); transition: font-size 0.2s;}
  h1, h2, h3, .syne { font-family: 'Syne', sans-serif; }

  /* HEADER */
  header { background: var(--verde); color: #fff; padding: 15px 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 10; flex-wrap: wrap; gap: 15px; }
  .header-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap;}
  .header-logo { background: var(--ouro); color: var(--verde); width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; }
  
  select.turma-select { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 8px 12px; border-radius: 8px; font-weight: 700; font-family: inherit; font-size: 14px; outline: none; cursor: pointer; max-width: 250px;}
  select.turma-select option { background: var(--card); color: var(--text); }
  
  .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center;}
  button { font-family: inherit; font-weight: 700; cursor: pointer; border: none; border-radius: 8px; padding: 10px 16px; font-size: 13px; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; }
  button:active { transform: scale(0.97); }
  .btn-primary { background: var(--ouro); color: var(--verde); }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
  .btn-secondary:hover { background: rgba(255,255,255,0.2); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-icon { padding: 8px; font-size: 16px; background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.3); }
  .btn-icon:hover { background: rgba(255,255,255,0.1); }

  /* ÁREA DA PLANILHA */
  #spreadsheet-container { flex: 1; overflow: auto; padding: 20px; }
  .table-wrapper { background: var(--card); border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid var(--border); width: max-content; min-width: 100%; }
  table { border-collapse: collapse; width: 100%; text-align: left; }
  
  th, td { border: 1px solid var(--border); padding: var(--ui-padding); white-space: nowrap; transition: padding 0.2s; }
  th { background: #f8fafc; font-size: 0.85em; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; z-index: 2; box-shadow: 0 1px 0 var(--border); min-width: var(--ui-col-width); transition: min-width 0.2s;}
  th:first-child { left: 0; z-index: 3; background: #f8fafc; box-shadow: 1px 1px 0 var(--border); min-width: 260px; }
  td:first-child { left: 0; position: sticky; background: #fff; z-index: 1; font-weight: 600; box-shadow: 1px 0 0 var(--border); }
  
  tr:hover td { background-color: #fcfdfd; }
  tr:hover td:first-child { background-color: #fcfdfd; }
  tr.inativo td { opacity: 0.4; background-color: #f8fafc; }
  tr.inativo td:first-child { background-color: #f8fafc; }

  /* NOME DO ALUNO CLICÁVEL */
  .aluno-link { color: var(--verde); cursor: pointer; display: flex; align-items: center; justify-content: space-between; width: 100%; }
  .aluno-link:hover { color: var(--ouro); text-decoration: underline; }
  .badge-inativo { font-size: 9px; background: var(--danger); color: white; padding: 2px 6px; border-radius: 4px; font-weight: 800; margin-left: 8px;}

  /* INPUTS DA PLANILHA */
  .cell-input { width: 100%; border: none; background: transparent; font-family: inherit; font-size: inherit; outline: none; color: var(--text); }
  .cell-input.nota { text-align: center; font-weight: 700; width: 100%; }
  .cell-input:focus { background: #e2e8f0; border-radius: 4px; padding: 2px 4px; }
  
  /* CHECKBOX CUSTOMIZADO */
  .check-wrapper { display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .check-wrapper input { display: none; }
  .custom-box { width: 24px; height: 24px; border: 2px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: 0.15s; background: #fff; }
  .check-wrapper input:checked + .custom-box { background: var(--verde); border-color: var(--verde); }
  .check-wrapper input:checked + .custom-box::after { content: '✓'; color: #fff; font-weight: 900; font-size: 14px; }

  .delete-col { background: none; border: none; color: #ef4444; padding: 2px; font-size: 14px; margin-left: 8px; cursor: pointer; opacity: 0.5; }
  .delete-col:hover { opacity: 1; }

  /* MODAIS */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; padding: 15px; backdrop-filter: blur(2px); }
  .modal-overlay.show { display: flex; animation: fadeIn 0.2s ease; }
  .modal-box { background: #fff; border-radius: 16px; width: 100%; max-width: 450px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); position: relative; max-height: 90vh; overflow-y: auto;}
  .modal-close { position: absolute; top: 16px; right: 16px; background: #f1f5f9; border: none; width: 30px; height: 30px; border-radius: 50%; font-weight: bold; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

  /* SLIDERS E CONFIGS */
  .slider-group { margin-bottom: 20px; }
  .slider-group label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 800; color: var(--muted); margin-bottom: 8px; text-transform: uppercase;}
  input[type=range] { width: 100%; accent-color: var(--verde); }

  /* AVISO DE SALVAMENTO */
  #toast { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 12px 24px; border-radius: 8px; font-weight: 700; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 100; box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
  #toast.show { opacity: 1; transform: translateY(-10px); }
</style>

        </div>

// --- 2. ESTADO DA APLICAÇÃO E PREFERÊNCIAS UI ---
let db = null;
let turmaSelecionadaId = null;
let alunoAtivoPerfil = null; 

let UI_PREFS = {
  fontSize: 14,
  colWidth: 140,
  padding: "10px 14px"
};

window.onload = () => {
  // Carrega Dados DB
  const salvo = localStorage.getItem('drcaio_diariopro');
  if (salvo) {
    db = JSON.parse(salvo);
  } else {
    db = JSON_MIGRACAO; 
    salvar();
  }

  // Carrega Preferências Visuais
  const uiSalvo = localStorage.getItem('drcaio_uiprefs');
  if (uiSalvo) {
    UI_PREFS = JSON.parse(uiSalvo);
    document.getElementById('ui-fs').value = UI_PREFS.fontSize;
    document.getElementById('ui-cw').value = UI_PREFS.colWidth;
    document.getElementById('ui-pad').value = UI_PREFS.padding;
    aplicarEstilosGlobais();
  }
  
  preencherSeletorTurmas();
  if(db.turmas.length > 0) {
    turmaSelecionadaId = db.turmas[0].id;
    document.getElementById('seletor-turma').value = turmaSelecionadaId;
    renderizarPlanilha();
  }
};

function salvar() {
  localStorage.setItem('drcaio_diariopro', JSON.stringify(db));
  mostrarToast();
}

function mostrarToast() {
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1500);
}

function gerarId() { return "id_" + Math.random().toString(36).substr(2, 9); }

function preencherSeletorTurmas() {
  const sel = document.getElementById('seletor-turma');
  sel.innerHTML = '';
  db.turmas.forEach(t => {
    sel.innerHTML += `<option value="${t.id}">${t.nome}</option>`;
  });
}

function mudarTurma() {
  turmaSelecionadaId = document.getElementById('seletor-turma').value;
  renderizarPlanilha();
}

// --- 3. RENDERIZAÇÃO DA PLANILHA ---
function renderizarPlanilha() {
  if (!turmaSelecionadaId) return;

  const turma = db.turmas.find(t => t.id === turmaSelecionadaId);
  const colunas = db.atividades[turmaSelecionadaId] || [];

  const thead = document.getElementById('planilha-head');
  const tbody = document.getElementById('planilha-body');
  
  // Cabeçalho
  let trHead = `<tr><th>NOME DO ALUNO</th>`;
  colunas.forEach(col => {
    trHead += `<th>
      <div style="display:flex; justify-content:space-between; align-items:center; gap:5px">
        <input type="text" class="cell-input" value="${col.nome}" style="font-weight:800;color:var(--muted);text-transform:uppercase" onchange="atualizarNomeColuna('${col.id}', this.value)">
        <button class="delete-col" onclick="removerColuna('${col.id}')" title="Excluir Coluna">✕</button>
      </div>
    </th>`;
  });
  trHead += `</tr>`;
  thead.innerHTML = trHead;

  // Linhas (Alunos)
  const alunos = [...turma.alunos].sort((a,b) => a.nome.localeCompare(b.nome));
  let htmlBody = '';
  
  alunos.forEach(aluno => {
    const inativoClass = aluno.ativo === false ? 'inativo' : '';
    const badgeInativo = aluno.ativo === false ? '<span class="badge-inativo">INATIVO</span>' : '';

    let tr = `<tr class="${inativoClass}">
      <td>
        <div class="aluno-link" onclick="abrirPerfilAluno('${aluno.id}')">
            <span>${aluno.nome} ${badgeInativo}</span>
            <span style="color:var(--muted); font-size:10px; font-weight:bold;">FICHA ➔</span>
        </div>
      </td>`;
      
    colunas.forEach(col => {
      const registro = (aluno.atividades && aluno.atividades[col.id]) ? aluno.atividades[col.id] : null;
      const disabled = aluno.ativo === false ? 'disabled' : '';

      if (col.tipo === 'visto') {
        const isChecked = (registro && registro.visto) ? 'checked' : '';
        tr += `<td style="text-align:center">
          <label class="check-wrapper">
            <input type="checkbox" onchange="atualizarRegistro('${aluno.id}', '${col.id}', this.checked, 'visto')" ${isChecked} ${disabled}>
            <div class="custom-box"></div>
          </label>
        </td>`;
      } else {
        const valNota = (registro && registro.nota != null) ? registro.nota : '';
        tr += `<td style="text-align:center">
          <input type="number" class="cell-input nota" placeholder="-" step="0.1" min="0" max="10" value="${valNota}" onchange="atualizarRegistro('${aluno.id}', '${col.id}', this.value, 'nota')" ${disabled}>
        </td>`;
      }
    });
    tr += `</tr>`;
    htmlBody += tr;
  });

  tbody.innerHTML = htmlBody;
}

// --- 4. DIÁRIO DE AULA ---
function abrirDiario() {
    document.getElementById('diario-data').value = new Date().toISOString().split('T')[0];
    document.getElementById('diario-conteudo').value = '';
    renderizarDiario();
    abrirModal('modal-diario');
}

function renderizarDiario() {
    const turma = db.turmas.find(t => t.id === turmaSelecionadaId);
    const diarios = turma.diario || [];
    const lista = document.getElementById('lista-diario');
    
    if (diarios.length === 0) {
        lista.innerHTML = '<div style="text-align:center; color:var(--muted); font-size:13px; padding:20px;">Nenhum registo efetuado nesta turma.</div>';
        return;
    }

    const ordenados = [...diarios].sort((a,b) => b.data.localeCompare(a.data));
    
    let html = '';
    ordenados.forEach(d => {
        const dataFormatada = d.data.split('-').reverse().join('/');
        html += `
        <div style="background:#fff; border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:flex-start; gap:10px;">
            <div>
                <div style="font-size:12px; font-weight:800; color:var(--verde); margin-bottom:4px;">${dataFormatada}</div>
                <div style="font-size:14px; color:var(--text); line-height:1.4;">${d.conteudo}</div>
            </div>
            <button class="delete-col" onclick="excluirDiario('${d.id}')" title="Excluir Registo">✕</button>
        </div>`;
    });
    lista.innerHTML = html;
}

function salvarDiario() {
    const data = document.getElementById('diario-data').value;
    const conteudo = document.getElementById('diario-conteudo').value.trim();
    
    if (!data || !conteudo) {
        alert("Por favor, preencha a data e o conteúdo da aula.");
        return;
    }

    const turma = db.turmas.find(t => t.id === turmaSelecionadaId);
    if (!turma.diario) turma.diario = [];
    
    turma.diario.push({
        id: "di_" + gerarId(),
        data: data,
        conteudo: conteudo
    });
    
    salvar();
    document.getElementById('diario-conteudo').value = '';
    renderizarDiario();
}

function excluirDiario(id) {
    if(confirm("Tem a certeza que deseja excluir este registo do diário?")) {
        const turma = db.turmas.find(t => t.id === turmaSelecionadaId);
        turma.diario = turma.diario.filter(d => d.id !== id);
        salvar();
        renderizarDiario();
    }
}

// --- 5. GESTÃO DE COLUNAS E REGISTROS ---
function adicionarAluno() {
  const turma = db.turmas.find(t => t.id === turmaSelecionadaId);
  const nome = prompt("Digite o nome completo do novo aluno:");
  if(nome && nome.trim() !== '') {
      turma.alunos.push({ id: gerarId(), nome: nome.trim(), mat: "---", atividades: {}, ativo: true });
      salvar();
      renderizarPlanilha();
  }
}

function adicionarAtividade() {
  const nome = prompt("Nome da Atividade (ex: Trabalho de Pesquisa):");
  if (!nome) return;
  const tipoInput = confirm("Clique em OK se for SOMENTE VISTO (✓)\nClique em CANCELAR se for VALER NOTA (0-10)");
  
  if (!db.atividades[turmaSelecionadaId]) { db.atividades[turmaSelecionadaId] = []; }

  db.atividades[turmaSelecionadaId].push({ id: "col_" + gerarId(), nome: nome, tipo: tipoInput ? "visto" : "nota" });
  salvar(); renderizarPlanilha();
}

function atualizarNomeColuna(colId, novoNome) {
  const colunas = db.atividades[turmaSelecionadaId];
  const col = colunas.find(c => c.id === colId);
  if (col) { col.nome = novoNome; salvar(); }
}

function removerColuna(colId) {
  if (confirm('Atenção: Eliminar esta atividade irá apagar as notas e os vistos de TODOS os alunos nesta coluna. Confirmar?')) {
    db.atividades[turmaSelecionadaId] = db.atividades[turmaSelecionadaId].filter(c => c.id !== colId);
    const turma = db.turmas.find(t => t.id === turmaSelecionadaId);
    turma.alunos.forEach(aluno => { if(aluno.atividades && aluno.atividades[colId]) delete aluno.atividades[colId]; });
    salvar(); renderizarPlanilha();
  }
}

function atualizarRegistro(alunoId, colId, valor, tipo) {
  const turma = db.turmas.find(t => t.id === turmaSelecionadaId);
  const aluno = turma.alunos.find(a => a.id === alunoId);
  
  if (!aluno.atividades) aluno.atividades = {};
  if (!aluno.atividades[colId]) aluno.atividades[colId] = {};
  
  if (tipo === 'nota') aluno.atividades[colId].nota = valor === '' ? null : parseFloat(valor);
  else aluno.atividades[colId].visto = valor;
  
  salvar();
}

// --- 6. PERFIL DO ALUNO E GESTÃO DE ESTADO ---
function abrirPerfilAluno(alunoId) {
    alunoAtivoPerfil = alunoId;
    const turma = db.turmas.find(t => t.id === turmaSelecionadaId);
    const aluno = turma.alunos.find(a => a.id === alunoId);
    const colunas = db.atividades[turmaSelecionadaId] || [];

    document.getElementById('perf-avatar').textContent = aluno.nome.charAt(0).toUpperCase();
    document.getElementById('perf-nome').textContent = aluno.nome;
    document.getElementById('perf-mat').textContent = `Matrícula: ${aluno.mat || '---'}`;

    const isAtivo = aluno.ativo !== false;
    document.getElementById('perf-badge-area').innerHTML = isAtivo 
        ? '<span style="background:#10b981; color:#fff; font-size:11px; padding:4px 10px; border-radius:12px; font-weight:bold;">Ativo na Turma</span>' 
        : '<span style="background:var(--danger); color:#fff; font-size:11px; padding:4px 10px; border-radius:12px; font-weight:bold;">Matrícula Trancada / Inativo</span>';

    let htmlAtivs = '';
    let somaNotas = 0, qtdNotas = 0;

    if (colunas.length === 0) {
        htmlAtivs = '<div style="color:var(--muted); font-size:12px; text-align:center">Nenhuma atividade registada para a turma.</div>';
    } else {
        colunas.forEach(col => {
            const reg = (aluno.atividades && aluno.atividades[col.id]) ? aluno.atividades[col.id] : null;
            let status = '--';
            
            if (col.tipo === 'visto') {
                status = (reg && reg.visto) ? '<span style="color:#10b981; font-weight:bold">✓ Visto Dado</span>' : '<span style="color:var(--danger)">Pendente</span>';
            } else {
                if (reg && reg.nota != null) {
                    status = `<span style="font-weight:bold">${reg.nota}</span>/10`;
                    somaNotas += reg.nota; qtdNotas++;
                } else {
                    status = '<span style="color:var(--danger)">Sem nota</span>';
                }
            }

            htmlAtivs += `
                <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px;">
                    <span style="color:var(--text); font-weight:600">${col.nome}</span>
                    <span>${status}</span>
                </div>
            `;
        });
        
        if (qtdNotas > 0) {
            const media = (somaNotas / qtdNotas).toFixed(1);
            const corMedia = media >= 6 ? '#10b981' : 'var(--danger)';
            htmlAtivs += `
                <div style="display:flex; justify-content:space-between; padding:12px 0 0 0; font-size:15px; margin-top:8px;">
                    <span style="font-weight:800; color:var(--text)">MÉDIA (Notas):</span>
                    <span style="font-weight:900; color:${corMedia}">${media}</span>
                </div>
            `;
        }
    }

    document.getElementById('perf-atividades').innerHTML = htmlAtivs;

    const btnToggle = document.getElementById('btn-tog-status');
    btnToggle.textContent = isAtivo ? 'Desativar Aluno' : 'Reativar Aluno';
    btnToggle.onclick = () => alternarStatusAluno(alunoId, !isAtivo);

    const btnDel = document.getElementById('btn-del-aluno');
    btnDel.onclick = () => confirmarExclusaoAluno(alunoId);

    abrirModal('modal-perfil');
}

function alternarStatusAluno(alunoId, novoStatus) {
    const turma = db.turmas.find(t => t.id === turmaSelecionadaId);
    const aluno = turma.alunos.find(a => a.id === alunoId);
    aluno.ativo = novoStatus;
    salvar();
    fecharModal('modal-perfil');
    renderizarPlanilha();
}

function confirmarExclusaoAluno(alunoId) {
    if(confirm("ATENÇÃO: A exclusão é permanente e irá apagar todas as notas e vistos deste aluno.\n\nDeseja prosseguir?")) {
        const turma = db.turmas.find(t => t.id === turmaSelecionadaId);
        turma.alunos = turma.alunos.filter(a => a.id !== alunoId);
        salvar();
        fecharModal('modal-perfil');
        renderizarPlanilha();
    }
}

// --- 7. PREFERÊNCIAS DA INTERFACE (UI) ---
function abrirModal(id) { document.getElementById(id).classList.add('show'); }
function fecharModal(id) { document.getElementById(id).classList.remove('show'); }

function previewUI() {
    const fs = document.getElementById('ui-fs').value;
    const cw = document.getElementById('ui-cw').value;
    const pad = document.getElementById('ui-pad').value;

    document.getElementById('lbl-fs').textContent = fs + 'px';
    document.getElementById('lbl-cw').textContent = cw + 'px';

    document.documentElement.style.setProperty('--ui-font-size', fs + 'px');
    document.documentElement.style.setProperty('--ui-col-width', cw + 'px');
    document.documentElement.style.setProperty('--ui-padding', pad);
}

function salvarConfigUI() {
    UI_PREFS = {
        fontSize: document.getElementById('ui-fs').value,
        colWidth: document.getElementById('ui-cw').value,
        padding: document.getElementById('ui-pad').value
    };
    localStorage.setItem('drcaio_uiprefs', JSON.stringify(UI_PREFS));
    fecharModal('modal-config');
}

function aplicarEstilosGlobais() {
    document.documentElement.style.setProperty('--ui-font-size', UI_PREFS.fontSize + 'px');
    document.documentElement.style.setProperty('--ui-col-width', UI_PREFS.colWidth + 'px');
    document.documentElement.style.setProperty('--ui-padding', UI_PREFS.padding);
}
